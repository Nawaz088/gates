{% extends "base.html" %}
{% block content %}
<div class="w-full max-w-md bg-white rounded-lg shadow-md p-8">
  <h1 class="text-2xl font-bold text-center mb-2">Reset your password</h1>
  <p class="text-gray-600 text-sm text-center mb-6">Enter your email and we'll send you a reset link.</p>
  {% if message %}
    <div class="bg-green-50 text-green-700 p-3 rounded mb-4 text-sm">{{ message }}</div>
  {% endif %}
  {% if error %}
    <div class="bg-red-50 text-red-700 p-3 rounded mb-4 text-sm">{{ error }}</div>
  {% endif %}
  <form action="/v1/passwords/reset" method="post" class="space-y-4">
    <div>
      <label for="email" class="block text-sm font-medium text-gray-700">Email address</label>
      <input type="email" name="email" id="email" required
             class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 shadow-sm focus:border-blue-500 focus:outline-none">
    </div>
    <button type="submit"
            class="w-full bg-blue-600 text-white py-2 px-4 rounded-md hover:bg-blue-700 transition">
      Send reset link
    </button>
  </form>
  <p class="mt-4 text-sm text-center">
    <a href="/sign-in" class="text-blue-600 hover:underline">Back to sign in</a>
  </p>
</div>
{% endblock %}
