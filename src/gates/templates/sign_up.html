{% extends "base.html" %}
{% block content %}
<div class="w-full max-w-md bg-white rounded-lg shadow-md p-8">
  <h1 class="text-2xl font-bold text-center mb-6">Create your account</h1>
  {% if error %}
    <div class="bg-red-50 text-red-700 p-3 rounded mb-4 text-sm">{{ error }}</div>
  {% endif %}
  <form action="/v1/sign_ups" method="post" class="space-y-4">
    <div class="grid grid-cols-2 gap-4">
      <div>
        <label for="first_name" class="block text-sm font-medium text-gray-700">First name</label>
        <input type="text" name="first_name" id="first_name"
               class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 shadow-sm focus:border-blue-500 focus:outline-none">
      </div>
      <div>
        <label for="last_name" class="block text-sm font-medium text-gray-700">Last name</label>
        <input type="text" name="last_name" id="last_name"
               class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 shadow-sm focus:border-blue-500 focus:outline-none">
      </div>
    </div>
    <div>
      <label for="email" class="block text-sm font-medium text-gray-700">Email address</label>
      <input type="email" name="email" id="email" required
             class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 shadow-sm focus:border-blue-500 focus:outline-none">
    </div>
    <div>
      <label for="password" class="block text-sm font-medium text-gray-700">Password</label>
      <input type="password" name="password" id="password" required minlength="8"
             class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 shadow-sm focus:border-blue-500 focus:outline-none">
    </div>
    <button type="submit"
            class="w-full bg-blue-600 text-white py-2 px-4 rounded-md hover:bg-blue-700 transition">
      Create account
    </button>
  </form>
  <p class="mt-4 text-sm text-center">
    Already have an account? <a href="/sign-in" class="text-blue-600 hover:underline">Sign in</a>
  </p>
</div>
{% endblock %}
