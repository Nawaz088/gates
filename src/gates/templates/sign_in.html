{% extends "base.html" %}
{% block content %}
<div class="w-full max-w-md bg-white rounded-lg shadow-md p-8">
  <h1 class="text-2xl font-bold text-center mb-6">Sign in to Gates</h1>
  {% if error %}
    <div class="bg-red-50 text-red-700 p-3 rounded mb-4 text-sm">{{ error }}</div>
  {% endif %}
  <form action="/v1/sign_ins" method="post" class="space-y-4">
    <div>
      <label for="identifier" class="block text-sm font-medium text-gray-700">Email or username</label>
      <input type="text" name="identifier" id="identifier" required
             class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 shadow-sm focus:border-blue-500 focus:outline-none">
    </div>
    <div>
      <label for="password" class="block text-sm font-medium text-gray-700">Password</label>
      <input type="password" name="password" id="password" required
             class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 shadow-sm focus:border-blue-500 focus:outline-none">
    </div>
    <button type="submit"
            class="w-full bg-blue-600 text-white py-2 px-4 rounded-md hover:bg-blue-700 transition">
      Sign in
    </button>
  </form>
  <div class="mt-4 text-sm text-center space-y-2">
    <p><a href="/forgot-password" class="text-blue-600 hover:underline">Forgot password?</a></p>
    <p>Don't have an account? <a href="/sign-up" class="text-blue-600 hover:underline">Sign up</a></p>
  </div>
</div>
{% endblock %}
