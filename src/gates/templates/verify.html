{% extends "base.html" %}
{% block content %}
<div class="w-full max-w-md bg-white rounded-lg shadow-md p-8 text-center">
  <h1 class="text-2xl font-bold mb-4">Verify your email</h1>
  <p class="text-gray-600 mb-6">Enter the verification code sent to your email.</p>
  {% if error %}
    <div class="bg-red-50 text-red-700 p-3 rounded mb-4 text-sm">{{ error }}</div>
  {% endif %}
  <form action="/v1/verifications/{{ verification_id }}/attempt" method="post" class="space-y-4">
    <div>
      <input type="text" name="code" id="code" required maxlength="6"
             class="block w-full text-center text-2xl tracking-widest rounded-md border border-gray-300 px-3 py-2 shadow-sm focus:border-blue-500 focus:outline-none"
             placeholder="000000">
    </div>
    <button type="submit"
            class="w-full bg-blue-600 text-white py-2 px-4 rounded-md hover:bg-blue-700 transition">
      Verify
    </button>
  </form>
</div>
{% endblock %}
