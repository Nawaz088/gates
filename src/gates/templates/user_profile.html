{% extends "base.html" %}
{% block content %}
<div class="w-full max-w-2xl bg-white rounded-lg shadow-md p-8">
  <h1 class="text-2xl font-bold mb-6">Profile</h1>
  <div class="border-b border-gray-200 mb-6">
    <nav class="flex gap-6">
      <a href="/user/profile" class="pb-3 border-b-2 border-blue-600 text-blue-600 font-medium">Account</a>
      <a href="/user/security" class="pb-3 text-gray-500 hover:text-gray-700">Security</a>
    </nav>
  </div>
  <div class="space-y-6">
    <div>
      <label class="block text-sm font-medium text-gray-500">Name</label>
      <p class="mt-1 text-gray-900">{{ user.first_name or '' }} {{ user.last_name or '' }}</p>
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-500">Email</label>
      <p class="mt-1 text-gray-900">{{ email or '—' }}</p>
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-500">Username</label>
      <p class="mt-1 text-gray-900">{{ user.username or '—' }}</p>
    </div>
  </div>
</div>
{% endblock %}
